<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encore Agent Concierge</title>
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-hover: #5A4FCF;
            --bg-color: #121212;
            --surface: #1E1E1E;
            --text: #F3F3F3;
            --text-secondary: #B3B3B3;
            --error: #FF4757;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--surface);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #A8C0FF 0%, #3F2B96 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.02);
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(108, 92, 231, 0.05);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-message {
            display: none;
            background-color: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .result-area {
            display: none;
            margin-top: 30px;
            background-color: #1A1A1A;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .result-area h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        pre {
            background-color: #111;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: #A8C0FF;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Encore Agent Concierge</h1>
        <p class="subtitle">Upload a concert poster to generate a personalized travel itinerary.</p>

        <form id="uploadForm">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <span class="upload-icon">🎵</span>
                <p>Click or drag a concert poster here</p>
                <input type="file" id="fileInput" accept="image/*" required>
                <img id="preview" alt="Poster Preview">
            </div>

            <button type="submit" class="btn" id="submitBtn" disabled>Generate Itinerary</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Analyzing poster and building your itinerary...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-area" id="resultArea">
            <h3>Your Concierge Plan</h3>
            <pre id="jsonResult"></pre>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('uploadForm');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');
        const resultArea = document.getElementById('resultArea');
        const jsonResult = document.getElementById('jsonResult');

        // Drag and drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    dropZone.querySelector('p').style.display = 'none';
                    dropZone.querySelector('.upload-icon').style.display = 'none';
                    submitBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // UI Reset
            submitBtn.disabled = true;
            loader.style.display = 'block';
            errorMessage.style.display = 'none';
            resultArea.style.display = 'none';

            try {
                // Ensure the fetch uses relative or absolute path appropriately
                const response = await fetch('/api/concierge', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    let errText = "An error occurred during processing.";
                    // Check if it's the 429 credits depleted error
                    if (data.detail && data.detail.includes("429") && data.detail.includes("credits are depleted")) {
                        errText = "Whoops! Our API credits ran out during the hackathon. 😭 Please check your AI Studio billing.";
                    } else if (data.detail) {
                        errText = data.detail;
                    }
                    throw new Error(errText);
                }

                jsonResult.textContent = JSON.stringify(data, null, 2);
                resultArea.style.display = 'block';

            } catch (err) {
                errorMessage.textContent = err.message;
                errorMessage.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
